name: Build and Publish

on:
  push:
    branches:
      - master
    paths-ignore:
      - "README.md"
      - "docker-compose.yml"
      - "LICENSE"

  schedule:
    # Every Sunday at 00:00 UTC
    - cron: "0 0 * * 0"

  workflow_dispatch:

env:
  IMAGE: docker.io/quackerd/d2ray

jobs:
  docker:
    runs-on: linux-amd64
    container:
      image: docker:cli

    steps:
      - name: Install Node and Docker CLI
        run: |
          apk add --no-cache \
                      nodejs \
                      npm \
                      git \
                      bash \
                      ca-certificates \
                      docker-cli \
                      docker-cli-buildx

      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}


      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          no-cache: true
          pull: true
          tags: |
            ${{ env.IMAGE }}:latest
